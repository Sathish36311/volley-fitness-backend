spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/volley_fitness}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    model:
      chat: google-genai
    google:
      genai:
        api-key: ${GEMINI_API_KEY:${AI_API_KEY:}}
        chat:
          options:
            model: ${AI_MODEL:gemini-2.5-flash-lite}
            response-mime-type: application/json

exercisedb:
  api:
    key: ${RAPIDAPI_KEY:${EXERCISE_API_KEY:}}
    host: ${EXERCISE_API_HOST:exercisedb.p.rapidapi.com}
    url: ${EXERCISE_API_URL:https://exercisedb.p.rapidapi.com}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-jwt-secret-change-me-min-32-chars}
    expiration-minutes: 1440
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  exercise:
    base-url: ${exercisedb.api.url}
    api-key: ${exercisedb.api.key}
    api-host: ${exercisedb.api.host}
    fallback-image: https://via.placeholder.com/240x160?text=Workout
    timeout-seconds: 5
    retry-attempts: 1
  ai:
    timeout-seconds: 10
    retry-attempts: 2
